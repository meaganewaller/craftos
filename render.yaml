services:
  - type: web
    name: gauge-calculator
    runtime: ruby
    rootDir: apps/gauge-calculator
    buildCommand: bundle install
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: SINATRA_ENV
        value: production
      - key: RACK_ENV
        value: production
      - key: BUNDLE_WITHOUT
        value: development:test

  - type: web
    name: yarn-substitution
    runtime: ruby
    rootDir: apps/yarn-substitution
    buildCommand: bundle install
    startCommand: bundle exec rackup -p $PORT -o 0.0.0.0
    envVars:
      - key: SINATRA_ENV
        value: production
      - key: RACK_ENV
        value: production
      - key: BUNDLE_WITHOUT
        value: development:test
      - key: YARN_CATALOG_PATH
        value: /opt/render/project/src/data/yarns

  - type: web
    name: stash-manager
    runtime: ruby
    rootDir: apps/stash-manager
    buildCommand: bundle install
    startCommand: bundle exec rackup -p $PORT -o 0.0.0.0
    envVars:
      - key: SINATRA_ENV
        value: production
      - key: RACK_ENV
        value: production
      - key: BUNDLE_WITHOUT
        value: development:test

  - type: web
    name: pattern-editor
    runtime: ruby
    rootDir: apps/pattern-editor
    buildCommand: bundle install
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: SINATRA_ENV
        value: production
      - key: RACK_ENV
        value: production
      - key: BUNDLE_WITHOUT
        value: development:test
