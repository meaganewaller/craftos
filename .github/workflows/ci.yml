name: CraftOS CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  checks: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      gauge-calculator: ${{ steps.changes.outputs.gauge-calculator }}
      yarn-substitution: ${{ steps.changes.outputs.yarn-substitution }}
      stash-manager: ${{ steps.changes.outputs.stash-manager }}
      pattern-editor: ${{ steps.changes.outputs.pattern-editor }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            gauge-calculator:
              - 'apps/gauge-calculator/**'
              - 'gems/fiber_units/**'
              - 'gems/fiber_gauge/**'
            yarn-substitution:
              - 'apps/yarn-substitution/**'
              - 'gems/fiber_units/**'
              - 'gems/yarn_skein/**'
            stash-manager:
              - 'apps/stash-manager/**'
              - 'gems/fiber_units/**'
              - 'gems/yarn_skein/**'
            pattern-editor:
              - 'apps/pattern-editor/**'
              - 'gems/fiber_units/**'
              - 'gems/fiber_gauge/**'
              - 'gems/fiber_pattern/**'

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        ruby: ["3.4", "4.0"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run StandardRB
        run: bundle exec standardrb

      - name: Install app dependencies
        run: |
          for dir in apps/*/; do
            if [ -f "$dir/Gemfile" ]; then
              echo "📦 Installing $dir"
              (cd "$dir" && bundle install)
            fi
          done

      - name: Run all tests
        run: bundle exec rake test:all

      - name: Ensure minimum coverage
        uses: joshmfrankel/simplecov-check-action@main
        with:
          minimum_suite_coverage: 95
          minimum_file_coverage: 90
          coverage_path: coverage/combined/.last_run.json
          coverage_json_path: coverage/combined/coverage.json
          github_token: ${{ secrets.GITHUB_TOKEN }}

  deploy-gauge-calculator:
    needs: [test, detect-changes]
    if: github.ref == 'refs/heads/main' && needs.detect-changes.outputs.gauge-calculator == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_GAUGE_CALCULATOR }}"

  deploy-yarn-substitution:
    needs: [test, detect-changes]
    if: github.ref == 'refs/heads/main' && needs.detect-changes.outputs.yarn-substitution == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_YARN_SUBSTITUTION }}"

  deploy-stash-manager:
    needs: [test, detect-changes]
    if: github.ref == 'refs/heads/main' && needs.detect-changes.outputs.stash-manager == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_STASH_MANAGER }}"

  deploy-pattern-editor:
    needs: [test, detect-changes]
    if: github.ref == 'refs/heads/main' && needs.detect-changes.outputs.pattern-editor == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_PATTERN_EDITOR }}"
